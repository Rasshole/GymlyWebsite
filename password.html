<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glemt kodeord | Gymly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=14">
    <script src="config.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js" defer></script>
    <style>
        body { margin: 0; background: linear-gradient(180deg, #f8f7ff 0%, #fafbfc 50%); font-family: 'Inter', sans-serif; color: #111; }
        .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card {
            width: 100%;
            max-width: 420px;
            background: #fff;
            border: 1px solid #E8E8EC;
            border-radius: 16px;
            padding: 1.4rem;
            box-shadow: 0 12px 30px rgba(151,111,255,0.12);
        }
        h1 { font-family: 'Manrope', sans-serif; font-size: 1.7rem; margin-bottom: 0.6rem; }
        p { color: #555; margin-bottom: 1rem; }
        label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 0.4rem; color: #444; }
        input {
            width: 100%;
            padding: 0.85rem 0.95rem;
            border: 1px solid #d8d8de;
            border-radius: 11px;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }
        input:focus {
            outline: none;
            border-color: #976FFF;
            box-shadow: 0 0 0 3px rgba(151,111,255,0.14);
        }
        button {
            width: 100%;
            border: none;
            border-radius: 11px;
            background: #976FFF;
            color: #fff;
            padding: 0.85rem;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { background: #7B4BFF; }
        .meta { text-align: center; margin-top: 0.9rem; font-size: 0.86rem; color: #666; min-height: 1.2rem; }
        .link-row { text-align: center; margin-top: 0.85rem; }
        .link-row a { color: #976FFF; text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Glemt kodeord?</h1>
            <p>Vi sender dig et link til at vaelge nyt kodeord.</p>
            <form id="resetRequestForm">
                <label for="resetRequestEmail">E-mail</label>
                <input id="resetRequestEmail" type="email" required placeholder="din@email.dk" autocomplete="email">
                <button type="submit">Send reset-link</button>
            </form>
            <div class="meta" id="resetRequestStatus"></div>
            <div class="link-row"><a href="login.html">Tilbage til login</a></div>
        </section>
    </main>

    <script>
        (function () {
            var form = document.getElementById('resetRequestForm');
            var emailInput = document.getElementById('resetRequestEmail');
            var statusEl = document.getElementById('resetRequestStatus');
            emailInput.value = localStorage.getItem('gymly_user_email') || '';

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                var email = (emailInput.value || '').trim();
                if (!window.gymlySupabase || !window.gymlySupabase.hasConfig || !window.gymlySupabase.hasConfig()) {
                    statusEl.textContent = 'Reset er ikke aktiveret endnu. Tilfoej Supabase URL/anon key.';
                    return;
                }
                statusEl.textContent = 'Sender link...';
                var redirectTo = window.location.origin + '/reset-password.html';
                var result = await window.gymlySupabase.sendPasswordReset(email, redirectTo);
                if (!result.ok) {
                    statusEl.textContent = 'Kunne ikke sende link lige nu. Proev igen.';
                    return;
                }
                localStorage.setItem('gymly_user_email', email);
                statusEl.textContent = 'Hvis kontoen findes, er reset-link sendt.';
            });
        })();
    </script>
</body>
</html>
