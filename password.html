<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adgangskode | Gymly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&family=Montserrat:wght@600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #FFFFFF;
        }
        
        .go-active-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #FFFFFF;
        }
        
        .go-active-container {
            max-width: 400px;
            width: 100%;
            background-color: var(--bg-white);
            padding: 3rem 2rem;
        }
        
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
        }
        
        .logo-outline {
            width: 80px;
            height: 80px;
            border: 3px solid var(--primary-blue);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-outline svg {
            width: 50px;
            height: 50px;
            stroke: var(--primary-blue);
        }
        
        .simple-heading {
            font-family: 'Manrope', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: #000000;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .simple-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #000000;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        
        .simple-input:focus {
            outline: none;
            border-color: var(--primary-blue);
        }
        
        .simple-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #000000;
            margin-bottom: 0.5rem;
            display: block;
            font-family: 'Inter', sans-serif;
        }
        
        .forgot-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            text-align: left;
            margin-bottom: 2rem;
            font-family: 'Inter', sans-serif;
        }
        
        .forgot-link:hover {
            text-decoration: underline;
        }
        
        .next-button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary-blue);
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #FFFFFF;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .next-button:hover {
            background-color: var(--primary-blue-dark);
        }
        
        .back-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            font-family: 'Inter', sans-serif;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <main class="go-active-page">
        <div class="go-active-container">
            <div class="logo-container">
                <div class="logo-outline">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                        <circle cx="8" cy="10" r="1.5"/>
                        <circle cx="16" cy="10" r="1.5"/>
                        <path d="M12 16c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2z"/>
                    </svg>
                </div>
            </div>
            
            <h1 class="simple-heading">Indtast adgangskode</h1>
            
            <form>
                <label for="password" class="simple-label">Adgangskode</label>
                <input type="password" id="password" name="password" class="simple-input" required>
                
                <a href="#" class="forgot-link">Glemt adgangskode?</a>
                
                <button type="submit" class="next-button">Log ind</button>
            </form>
            
            <a href="go-active.html" class="back-link">Tilbage</a>
        </div>
    </main>
    
    <!-- Footer Bar -->
    <div class="footer-bar">
        <a href="privacy.html" class="footer-bar-link">Privatlivspolitik</a>
        <a href="terms.html" class="footer-bar-link">Servicevilkår</a>
    </div>
</body>
</html>
