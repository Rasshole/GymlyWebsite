<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyt kodeord | Gymly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&display=swap" rel="stylesheet">
    <script src="config.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js" defer></script>
    <script src="auth.js" defer></script>
    <style>
        :root {
            --primary: #976FFF;
            --primary-dark: #7B4BFF;
            --primary-pastel: rgba(151,111,255,0.14);
            --border: #E8E8EC;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, #f8f7ff 0%, #fafbfc 55%);
            color: #111;
        }
        .card {
            width: 100%;
            max-width: 430px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: 0 14px 40px rgba(151,111,255,0.14);
            padding: 1.4rem;
        }
        h1 {
            margin: 0 0 0.3rem;
            font-family: 'Manrope', sans-serif;
            font-size: 1.7rem;
        }
        .subtitle {
            margin: 0 0 1rem;
            color: #666;
            font-size: 0.94rem;
        }
        .row { margin-bottom: 0.75rem; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 0.35rem; }
        input {
            width: 100%;
            border: 1px solid #d9d9df;
            border-radius: 11px;
            padding: 0.85rem 0.95rem;
            font-size: 0.95rem;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-pastel);
        }
        .feedback { min-height: 1.2rem; font-size: 0.84rem; margin-bottom: 0.6rem; color: #666; }
        .feedback.error { color: #b42318; }
        .feedback.success { color: #067647; }
        button {
            width: 100%;
            border: none;
            border-radius: 11px;
            padding: 0.88rem;
            background: var(--primary);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }
        button:hover { background: var(--primary-dark); }
        .secondary-btn {
            width: 100%;
            display: inline-block;
            margin-top: 0.65rem;
            text-align: center;
            text-decoration: none;
            border: 1px solid #d8d8de;
            border-radius: 11px;
            padding: 0.78rem;
            color: #111;
            font-weight: 600;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <section class="card">
        <div id="expiredState" class="hidden">
            <h1>Linket er udloeebet</h1>
            <p class="subtitle">Send et nyt reset-link for at opdatere din adgangskode.</p>
            <a class="secondary-btn" href="password.html">Send nyt link</a>
        </div>

        <div id="formState" class="hidden">
            <h1>Nyt kodeord</h1>
            <p class="subtitle">Vaelg et nyt sikkert kodeord til din Gymly konto.</p>
            <form id="resetPasswordForm">
                <div class="row">
                    <label for="newPassword">Nyt kodeord</label>
                    <input id="newPassword" type="password" minlength="8" autocomplete="new-password" required>
                </div>
                <div class="row">
                    <label for="confirmPassword">Bekraeft kodeord</label>
                    <input id="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
                </div>
                <p id="validationFeedback" class="feedback"></p>
                <button type="submit" id="submitBtn">Opdater kodeord</button>
            </form>
            <a class="secondary-btn" id="openAppBtn" href="gymlyapp://home">Aabn app</a>
        </div>

        <div id="successState" class="hidden">
            <h1>Kodeord opdateret</h1>
            <p class="subtitle">Du bliver sendt tilbage til appen...</p>
            <a class="secondary-btn" id="successOpenAppBtn" href="gymlyapp://home">Aabn app</a>
        </div>
    </section>

    <script>
        (function () {
            var formState = document.getElementById('formState');
            var expiredState = document.getElementById('expiredState');
            var successState = document.getElementById('successState');
            var form = document.getElementById('resetPasswordForm');
            var newPasswordInput = document.getElementById('newPassword');
            var confirmPasswordInput = document.getElementById('confirmPassword');
            var feedback = document.getElementById('validationFeedback');
            var submitBtn = document.getElementById('submitBtn');
            var openAppBtn = document.getElementById('openAppBtn');
            var successOpenAppBtn = document.getElementById('successOpenAppBtn');

            function showState(name) {
                formState.classList.add('hidden');
                expiredState.classList.add('hidden');
                successState.classList.add('hidden');
                if (name === 'form') formState.classList.remove('hidden');
                if (name === 'expired') expiredState.classList.remove('hidden');
                if (name === 'success') successState.classList.remove('hidden');
            }

            function validateFields() {
                var password = newPasswordInput.value || '';
                var confirm = confirmPasswordInput.value || '';
                if (!password && !confirm) {
                    feedback.textContent = '';
                    feedback.className = 'feedback';
                    return false;
                }
                if (password.length < 8) {
                    feedback.textContent = 'Kodeord skal vaere mindst 8 tegn.';
                    feedback.className = 'feedback error';
                    return false;
                }
                if (confirm && password !== confirm) {
                    feedback.textContent = 'Kodeordene matcher ikke.';
                    feedback.className = 'feedback error';
                    return false;
                }
                feedback.textContent = 'Ser godt ud.';
                feedback.className = 'feedback success';
                return true;
            }

            function startRedirectFlow() {
                setTimeout(function () {
                    window.location.href = 'gymlyapp://home';
                    setTimeout(function () {
                        window.location.href = 'https://gymly.dk/download';
                    }, 1600);
                }, 1000);
            }

            function setupAppFallback(anchorEl) {
                anchorEl.addEventListener('click', function () {
                    setTimeout(function () {
                        window.location.href = 'https://gymly.dk/download';
                    }, 1600);
                });
            }

            async function init() {
                setupAppFallback(openAppBtn);
                setupAppFallback(successOpenAppBtn);

                if (!window.gymlySupabase || !window.gymlySupabase.hasConfig || !window.gymlySupabase.hasConfig()) {
                    showState('expired');
                    return;
                }

                var session = await window.gymlySupabase.getSession();
                if (!session) {
                    showState('expired');
                    return;
                }
                if (window.setLoggedIn) window.setLoggedIn();
                showState('form');
            }

            newPasswordInput.addEventListener('input', validateFields);
            confirmPasswordInput.addEventListener('input', validateFields);

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                var valid = validateFields();
                if (!valid) return;

                submitBtn.disabled = true;
                feedback.textContent = 'Opdaterer kodeord...';
                feedback.className = 'feedback';

                var newPassword = newPasswordInput.value;
                var updated = await window.gymlySupabase.updatePassword(newPassword);
                if (!updated.ok) {
                    submitBtn.disabled = false;
                    feedback.textContent = 'Kunne ikke opdatere kodeord lige nu. Proev igen.';
                    feedback.className = 'feedback error';
                    return;
                }

                var sessionAfter = await window.gymlySupabase.getSession();
                if (!sessionAfter) {
                    submitBtn.disabled = false;
                    feedback.textContent = 'Session udloeeb. Send nyt link.';
                    feedback.className = 'feedback error';
                    showState('expired');
                    return;
                }

                if (window.setLoggedIn) window.setLoggedIn();
                showState('success');
                startRedirectFlow();
            });

            init();
        })();
    </script>
</body>
</html>
