<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat | Gymly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&family=Montserrat:wght@600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
    <script src="auth.js"></script>
    <script>requireAuth();</script>
    <style>
        body {
            background: #FFFFFF;
            min-height: 100vh;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        
        .chat-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin-top: 80px;
            padding-bottom: 80px;
        }
        
        .chat-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            top: 80px;
            z-index: 10;
        }
        
        .back-button {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            color: #000;
        }
        
        .back-button svg {
            width: 24px;
            height: 24px;
        }
        
        .chat-user-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .chat-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #976FFF, #7B4BFF);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            position: relative;
        }
        
        .chat-avatar.online::after {
            content: '';
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #4CAF50;
            border: 2px solid white;
            border-radius: 50%;
        }
        
        .chat-user-details {
            flex: 1;
        }
        
        .chat-user-name {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            color: #000;
            margin-bottom: 0.25rem;
        }
        
        .chat-user-status {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #4CAF50;
        }
        
        .chat-header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .header-action-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
            color: #000;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            background: #f8f9fa;
        }
        
        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 70%;
            animation: fadeIn 0.3s ease-in;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar-small {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #976FFF, #7B4BFF);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            flex-shrink: 0;
        }
        
        .message-content {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        
        .message-bubble {
            background: white;
            border-radius: 18px;
            padding: 0.75rem 1rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #000;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-wrap: break-word;
        }
        
        .message.sent .message-bubble {
            background: linear-gradient(135deg, #976FFF, #7B4BFF);
            color: white;
        }
        
        .message-time {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            color: #999;
            padding: 0 0.5rem;
        }
        
        .message.sent .message-time {
            text-align: right;
        }
        
        .chat-input-container {
            background: white;
            border-top: 1px solid #e0e0e0;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            position: sticky;
            bottom: 80px;
            z-index: 10;
        }
        
        .chat-input {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 24px;
            padding: 0.75rem 1.25rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #000;
            outline: none;
            resize: none;
            max-height: 100px;
        }
        
        .chat-input:focus {
            border-color: #976FFF;
        }
        
        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #976FFF, #7B4BFF);
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }
        
        .send-button:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        
        .send-button:active {
            transform: scale(0.95);
        }
        
        .send-button svg {
            width: 20px;
            height: 20px;
            color: white;
        }
        
        .send-button:disabled {
            background: #e0e0e0;
            cursor: not-allowed;
        }
        
        .send-button:disabled svg {
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <a href="index.html" class="header-bar-logo" aria-label="Hjem">
            <img src="assets/logo.png" alt="Gymly" class="header-bar-logo-img">
        </a>
    </div>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <!-- Settings Icon -->
            <button class="settings-icon" onclick="window.location.href='settings.html'" style="background: none; border: none; cursor: pointer; padding: 0.5rem; display: flex; align-items: center; justify-content: center;">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="2"/>
                    <path d="M12 2 L12 4.5 M12 19.5 L12 22 M2 12 L4.5 12 M19.5 12 L22 12 M5.64 5.64 L7.41 7.41 M16.59 16.59 L18.36 18.36 M5.64 18.36 L7.41 16.59 M16.59 7.41 L18.36 5.64 M12 2 L13.5 3.5 M12 2 L10.5 3.5 M12 22 L13.5 20.5 M12 22 L10.5 20.5 M2 12 L3.5 10.5 M2 12 L3.5 13.5 M22 12 L20.5 10.5 M22 12 L20.5 13.5"/>
                </svg>
            </button>
            
            <!-- Logo -->
            <a href="dashboard.html" class="logo-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                    <circle cx="8" cy="10" r="1.5"/>
                    <circle cx="16" cy="10" r="1.5"/>
                    <path d="M12 16c-1.1 0-2-.9-2-2h4c0 1.1-.9 2-2 2z"/>
                </svg>
            </a>
            
            <!-- Search Bar -->
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="m21 21-4.35-4.35"/>
                </svg>
                <input type="text" class="search-input" placeholder="Søg">
            </div>
            
            <!-- Navigation Icons -->
            <nav class="nav-icons">
                <a href="dashboard.html" class="nav-icon-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                    </svg>
                    <span class="nav-label">Hjem</span>
                </a>
                <a href="online.html" class="nav-icon-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <circle cx="12" cy="12" r="6"/>
                        <circle cx="12" cy="12" r="2"/>
                    </svg>
                    <span class="nav-label">Online</span>
                </a>
                <a href="checkin.html" class="nav-icon-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M8 12l2 2 4-4"/>
                    </svg>
                    <span class="nav-label">Tjek ind</span>
                </a>
                <a href="messages.html" class="nav-icon-item active">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                    <span class="nav-label">Beskeder</span>
                </a>
                <a href="profile.html" class="nav-icon-item">
                    <svg class="nav-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span class="nav-label">Profil</span>
                </a>
            </nav>
            
            <!-- Action Buttons -->
            <div class="header-actions">
                <a href="splash.html" class="btn-black">Gå aktiv</a>
                <a href="download.html" class="btn-black">Download</a>
            </div>
        </div>
    </header>

    <!-- Chat Page -->
    <div class="chat-page">
        <!-- Chat Header -->
        <div class="chat-header">
            <button class="back-button" onclick="window.location.href='messages.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <div class="chat-user-info">
                <div class="chat-avatar online" id="chatAvatar">MK</div>
                <div class="chat-user-details">
                    <div class="chat-user-name" id="chatUserName">Mads Kristensen</div>
                    <div class="chat-user-status" id="chatUserStatus">Online</div>
                </div>
            </div>
            <div class="chat-header-actions">
                <svg class="header-action-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
            </div>
        </div>
        
        <!-- Chat Messages -->
        <div class="chat-messages" id="chatMessages">
            <!-- Messages will be dynamically added here -->
        </div>
        
        <!-- Chat Input -->
        <div class="chat-input-container">
            <textarea class="chat-input" id="chatInput" placeholder="Skriv en besked..." rows="1"></textarea>
            <button class="send-button" id="sendButton" onclick="sendMessage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"/>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Footer Bar -->
    <div class="footer-bar">
        <a href="privacy.html" class="footer-bar-link">Privatlivspolitik</a>
        <a href="terms.html" class="footer-bar-link">Vilkår og betingelser</a>
    </div>
    
    <script>
        // Chat data for different users
        const chatData = {
            'mads': {
                name: 'Mads Kristensen',
                initials: 'MK',
                online: true,
                messages: [
                    { text: 'Hej! Skal vi træne sammen i morgen?', sent: false, time: '14:30' },
                    { text: 'Ja, det lyder godt! Hvad tid passer dig?', sent: true, time: '14:32' },
                    { text: 'Klokken 10?', sent: false, time: '14:33' },
                    { text: 'Perfekt! Vi ses i morgen kl. 10 👋', sent: true, time: '14:35' }
                ]
            },
            'sarah': {
                name: 'Sarah Larsen',
                initials: 'SL',
                online: true,
                messages: [
                    { text: 'Jeg er nede i centeret nu, hvis du vil komme?', sent: false, time: '18:15' },
                    { text: 'Ja, kommer om 10 min!', sent: true, time: '18:16' }
                ]
            },
            'thomas': {
                name: 'Thomas Jensen',
                initials: 'TJ',
                online: false,
                messages: [
                    { text: 'Tak for i dag! Det var fedt at træne sammen 👋', sent: false, time: '16:20' },
                    { text: 'Selv tak! Vi ses næste gang 💪', sent: true, time: '16:25' }
                ]
            },
            'anna': {
                name: 'Anna Nielsen',
                initials: 'AN',
                online: false,
                messages: [
                    { text: 'Weekend Warriors gruppen træner lørdag kl. 10', sent: false, time: '15:30' },
                    { text: 'Fedt! Jeg kommer med!', sent: true, time: '15:32' }
                ]
            },
            'jeff': {
                name: 'Jeff',
                initials: 'JE',
                online: false,
                messages: [
                    { text: 'Nyt PR på benpres! 180kg 🔥', sent: false, time: 'I går 14:00' },
                    { text: 'Wow, stærkt! Tillykke! 🎉', sent: true, time: 'I går 14:05' }
                ]
            },
            'lars': {
                name: 'Lars',
                initials: 'LA',
                online: false,
                messages: [
                    { text: 'Skal vi lave en gruppetræning næste uge?', sent: false, time: 'I går 10:00' },
                    { text: 'Ja, det er en god idé! Hvornår passer det?', sent: true, time: 'I går 10:15' }
                ]
            }
        };
        
        // Get user from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('user') || 'mads';
        const currentChat = chatData[userId] || chatData['mads'];
        
        // Initialize chat
        function initChat() {
            // Set user info
            document.getElementById('chatUserName').textContent = currentChat.name;
            document.getElementById('chatAvatar').textContent = currentChat.initials;
            if (currentChat.online) {
                document.getElementById('chatAvatar').classList.add('online');
                document.getElementById('chatUserStatus').textContent = 'Online';
            } else {
                document.getElementById('chatAvatar').classList.remove('online');
                document.getElementById('chatUserStatus').textContent = 'Offline';
            }
            
            // Load messages
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';
            
            currentChat.messages.forEach(message => {
                addMessage(message.text, message.sent, message.time);
            });
            
            // Scroll to bottom
            scrollToBottom();
        }
        
        function addMessage(text, sent, time) {
            const messagesContainer = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sent ? 'sent' : 'received'}`;
            
            const avatar = sent ? 'DU' : currentChat.initials;
            
            messageDiv.innerHTML = `
                <div class="message-avatar-small">${avatar}</div>
                <div class="message-content">
                    <div class="message-bubble">${text}</div>
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            const now = new Date();
            const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');
            
            addMessage(text, true, time);
            input.value = '';
            input.style.height = 'auto';
            
            // Simulate response after 1-2 seconds
            setTimeout(() => {
                const responses = [
                    'Lyder godt! 👍',
                    'Perfekt!',
                    'Okay, vi ses!',
                    'Fedt! 💪',
                    'Tak!'
                ];
                const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                const responseTime = new Date();
                const responseTimeStr = responseTime.getHours() + ':' + String(responseTime.getMinutes()).padStart(2, '0');
                addMessage(randomResponse, false, responseTimeStr);
            }, 1000 + Math.random() * 1000);
        }
        
        function scrollToBottom() {
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // Auto-resize textarea
        const chatInput = document.getElementById('chatInput');
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });
        
        // Send on Enter (but allow Shift+Enter for new line)
        chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // Initialize on load
        initChat();
    </script>
</body>
</html>
