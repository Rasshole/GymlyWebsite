<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="color-scheme" content="light" />
  <title>Åbn Gymly</title>
  <meta name="description" content="Åbn Gymly-appen for at fuldføre login." />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    :root {
      --gymly-purple: #976fff;
      --gymly-purple-deep: #7b4bff;
      --gymly-purple-soft: #b894ff;
      --gymly-gradient: linear-gradient(135deg, #9b73ff 0%, #976fff 40%, #7b4bff 100%);
      --gymly-gradient-hover: linear-gradient(135deg, #a680ff 0%, #9b73ff 45%, #8255ff 100%);
      --text-strong: #0c0c10;
      --text-body: rgba(18, 18, 24, 0.62);
      --text-soft: rgba(18, 18, 24, 0.45);
      --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, 'Segoe UI', sans-serif;
      --radius-card: clamp(26px, 5vw, 32px);
      --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
    }

    html {
      -webkit-text-size-adjust: 100%;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      min-height: 100dvh;
    }

    body {
      font-family: var(--font);
      color: var(--text-strong);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
      padding: max(20px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
    }

    .callback-canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      background: linear-gradient(180deg, #fffeff 0%, #f3f1fd 42%, #ece8fb 78%, #e8e4fa 100%);
    }

    .callback-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(75px);
      opacity: 0.65;
      animation: blobDrift 22s var(--ease-premium) infinite alternate;
    }

    .callback-blob--a {
      width: min(90vw, 520px);
      height: min(90vw, 520px);
      top: -12%;
      right: -18%;
      background: radial-gradient(circle, rgba(151, 111, 255, 0.55) 0%, transparent 72%);
      animation-duration: 24s;
    }

    .callback-blob--b {
      width: min(85vw, 480px);
      height: min(85vw, 480px);
      bottom: -20%;
      left: -22%;
      background: radial-gradient(circle, rgba(147, 90, 255, 0.38) 0%, transparent 72%);
      animation-duration: 28s;
      animation-delay: -4s;
    }

    @keyframes blobDrift {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 0.55;
      }
      100% {
        transform: translate(-4vw, 3vh) scale(1.08);
        opacity: 0.72;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .callback-blob {
        animation: none;
        opacity: 0.45;
      }
      .callback-card,
      .callback-logo,
      .callback-eyebrow,
      .callback-title,
      .callback-lead,
      .callback-btn,
      .callback-hint {
        animation: none !important;
        opacity: 1 !important;
        transform: none !important;
      }
    }

    .callback-shell {
      position: relative;
      z-index: 1;
      min-height: calc(100dvh - 44px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .callback-card {
      width: min(100%, 400px);
      padding: clamp(28px, 6vw, 36px) clamp(22px, 5vw, 32px) clamp(26px, 5vw, 32px);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: var(--radius-card);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.9) inset,
        0 24px 48px -12px rgba(99, 73, 200, 0.18),
        0 8px 24px -8px rgba(30, 20, 80, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      text-align: center;
      animation: cardIn 0.7s var(--ease-premium) both;
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(16px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .callback-logo {
      display: block;
      width: clamp(88px, 28vw, 112px);
      height: auto;
      margin: 0 auto 1.25rem;
      animation: fadeUp 0.65s var(--ease-premium) 0.05s both;
    }

    .callback-eyebrow {
      margin: 0 0 0.5rem;
      font-size: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gymly-purple-deep);
      animation: fadeUp 0.65s var(--ease-premium) 0.1s both;
    }

    .callback-title {
      margin: 0 0 0.65rem;
      font-size: clamp(1.35rem, 4.5vw, 1.55rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.2;
      animation: fadeUp 0.65s var(--ease-premium) 0.15s both;
    }

    .callback-lead {
      margin: 0 auto 1.5rem;
      max-width: 28ch;
      font-size: clamp(0.9375rem, 3.2vw, 1rem);
      line-height: 1.55;
      color: var(--text-body);
      animation: fadeUp 0.65s var(--ease-premium) 0.2s both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .callback-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      min-width: min(100%, 240px);
      padding: 0.9rem 1.75rem;
      border: none;
      border-radius: 16px;
      background: var(--gymly-gradient);
      color: #fff;
      font-family: inherit;
      font-size: 1.0625rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      text-decoration: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.25) inset,
        0 12px 28px -6px rgba(123, 75, 255, 0.45);
      transition:
        transform 0.2s var(--ease-premium),
        box-shadow 0.2s var(--ease-premium),
        background 0.2s var(--ease-premium);
      animation: fadeUp 0.65s var(--ease-premium) 0.28s both;
    }

    .callback-btn:hover {
      background: var(--gymly-gradient-hover);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.3) inset,
        0 16px 32px -6px rgba(123, 75, 255, 0.5);
    }

    .callback-btn:active {
      transform: scale(0.98);
    }

    .callback-btn:focus-visible {
      outline: 2px solid var(--gymly-purple);
      outline-offset: 3px;
    }

    .callback-hint {
      margin: 1.15rem 0 0;
      font-size: 0.8125rem;
      line-height: 1.45;
      color: var(--text-soft);
      animation: fadeUp 0.65s var(--ease-premium) 0.34s both;
    }
  </style>
  <script>
    (function () {
      var APP_CALLBACK = 'gymly://auth/callback';
      var search = window.location.search || '';
      var hash = window.location.hash || '';
      var deepLink = APP_CALLBACK + search + hash;

      function openApp() {
        window.location.replace(deepLink);
      }

      document.addEventListener('DOMContentLoaded', function () {
        var btn = document.getElementById('open-app');
        if (!btn) return;
        btn.setAttribute('href', deepLink);
        btn.addEventListener('click', function (e) {
          e.preventDefault();
          openApp();
        });
      });
    })();
  </script>
</head>
<body>
  <div class="callback-canvas" aria-hidden="true">
    <div class="callback-blob callback-blob--a"></div>
    <div class="callback-blob callback-blob--b"></div>
  </div>

  <main class="callback-shell">
    <article class="callback-card">
      <img
        class="callback-logo"
        src="/assets/logo.png"
        alt="Gymly"
        width="112"
        height="44"
        decoding="async"
      />
      <p class="callback-eyebrow">Næsten færdig</p>
      <h1 class="callback-title">Åbn Gymly</h1>
      <p class="callback-lead" id="status">
        Tryk på knappen for at åbne appen og fuldføre login på denne enhed.
      </p>
      <a id="open-app" class="callback-btn" href="gymly://auth/callback">Åbn Gymly</a>
      <p class="callback-hint">Brug Gymly-appen på telefonen — ikke App Store.</p>
    </article>
  </main>
</body>
</html>
