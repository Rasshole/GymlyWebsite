<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gå aktiv | Gymly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&family=Montserrat:wght@600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
    <style>
        body {
            background-color: #FFFFFF;
        }
        
        .go-active-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background-color: #FFFFFF;
        }
        
        .go-active-container {
            max-width: 400px;
            width: 100%;
            background-color: var(--bg-white);
            padding: 3rem 2rem;
        }
        
        .logo-container {
            display: flex;
            justify-content: center;
            margin-bottom: 2rem;
            text-decoration: none;
        }
        
        .logo-container:hover {
            opacity: 0.9;
        }
        
        .logo-outline {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .logo-outline img {
            width: 80px;
            height: 80px;
            object-fit: contain;
        }
        
        .simple-heading {
            font-family: 'Manrope', sans-serif;
            font-size: 1.75rem;
            font-weight: 800;
            color: #000000;
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .simple-input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #000000;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            margin-bottom: 1rem;
            transition: border-color 0.2s;
        }
        
        .simple-input:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .simple-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: #000000;
            margin-bottom: 0.5rem;
            display: block;
            font-family: 'Inter', sans-serif;
        }
        
        .phone-link {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            display: block;
            text-align: left;
            margin-bottom: 2rem;
            font-family: 'Inter', sans-serif;
        }
        
        .phone-link:hover {
            text-decoration: underline;
        }
        
        .next-button {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            border: none;
            border-radius: 24px;
            font-size: 1rem;
            font-weight: 600;
            color: #FFFFFF;
            cursor: pointer;
            transition: background-color 0.2s;
            font-family: 'Inter', sans-serif;
        }
        
        .next-button:hover {
            background-color: var(--primary-dark);
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <main class="go-active-page">
        <div class="go-active-container">
            <a href="index.html" class="logo-container" aria-label="Hjem">
                <div class="logo-outline">
                    <img src="assets/logo.png" alt="Gymly">
                </div>
            </a>
            
            <h1 class="simple-heading">Log på Gymly</h1>
            
            <form onsubmit="event.preventDefault(); window.location.href='password.html';">
                <label for="username" class="simple-label">Brugernavn eller e-mail</label>
                <input type="text" id="username" name="username" class="simple-input" required>
                
                <a href="#" class="phone-link">Brug telefonnummer i stedet</a>
                
                <button type="submit" class="next-button">Næste</button>
            </form>
        </div>
    </main>
    
    <!-- Footer Bar -->
    <div class="footer-bar">
        <a href="privacy.html" class="footer-bar-link">Privatlivspolitik</a>
        <a href="terms.html" class="footer-bar-link">Vilkår og betingelser</a>
    </div>
</body>
</html>
