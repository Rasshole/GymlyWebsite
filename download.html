<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Gymly | Fitness Tracking & Fællesskab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@800&family=Montserrat:wght@600&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=2">
    <style>
        .download-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            background-image: linear-gradient(rgba(0, 40, 85, 0.2), rgba(0, 115, 230, 0.25)), url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        .download-container {
            max-width: 800px;
            width: 100%;
            background-color: var(--bg-white);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 3rem;
            text-align: center;
        }
        
        .download-container h1 {
            font-family: 'Manrope', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }
        
        .download-container p {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        
        .download-buttons {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            align-items: center;
        }
        
        .download-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            padding: 1.25rem 2.5rem;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            transition: all 0.3s;
            min-width: 280px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .download-btn-apple {
            background-color: #000000;
            color: white;
        }
        
        .download-btn-apple:hover {
            background-color: #333333;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        
        .download-btn-google {
            background-color: #FFFFFF;
            color: #000000;
            border: 1px solid #E0E0E0;
        }
        
        .download-btn-google:hover {
            background-color: #F5F5F5;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }
        
        .download-icon {
            width: 32px;
            height: 32px;
        }
        
        .qr-code {
            margin-top: 2.5rem;
            padding-top: 2.5rem;
            border-top: 1px solid var(--border-color);
        }
        
        .qr-code h3 {
            font-family: 'Manrope', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 1rem;
        }
        
        .qr-placeholder {
            width: 200px;
            height: 200px;
            background: #F5F5F5;
            border: 2px dashed var(--border-color);
            border-radius: 12px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <!-- Main Content -->
    <main class="download-page">
        <div class="download-container">
            <h1>Download Gymly</h1>
            <p>Få Gymly på din telefon og begynd at træne sammen med vennerne. Tjek ind når du rammer centeret, se hvem der er aktive, og del dine resultater.</p>
            
            <div class="download-buttons">
                <a href="#" class="download-btn download-btn-apple">
                    <svg class="download-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09l.01-.01zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/>
                    </svg>
                    <span>Download til iOS</span>
                </a>
                
                <a href="#" class="download-btn download-btn-google">
                    <svg class="download-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3,20.5V3.5C3,2.91 3.34,2.39 3.84,2.11L11.16,12L3.84,21.89C3.34,21.61 3,21.09 3,20.5M16.81,15.12L6.05,21.34L14.54,12L16.81,15.12M20.16,10.81C20.5,11.08 20.75,11.5 20.75,12C20.75,12.5 20.53,12.9 20.18,13.18L17.89,14.5L15.39,12L17.89,9.5L20.16,10.81M6.05,2.66L16.81,8.88L14.54,12L6.05,2.66Z"/>
                    </svg>
                    <span>Download til Android</span>
                </a>
            </div>
            
            <div class="qr-code">
                <h3>Scan QR-koden</h3>
                <p style="font-size: 0.95rem; color: var(--text-light); margin-bottom: 1rem;">Scan med din telefon for at downloade appen</p>
                <div class="qr-placeholder">
                    QR-kode kommer snart
                </div>
            </div>
        </div>
    </main>
</body>
</html>
