<!DOCTYPE html>
<html lang="da" class="landing-page">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konto bekræftet | Gymly</title>
    <meta name="description" content="Din Gymly-konto er bekræftet.">
    <link rel="canonical" href="https://gymlyapp.com/confirm">
    <script>
        document.documentElement.classList.add('confirm-enhanced');
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=13">
    <style>
        :root {
            --confirm-primary: #976fff;
            --confirm-primary-dark: #7b4bff;
            --confirm-gradient: linear-gradient(135deg, #976fff 0%, #7b4bff 100%);
            --confirm-text: #0f0f14;
            --confirm-muted: #5c5c6d;
            --confirm-light: #8e8e9a;
            --confirm-radius: 20px;
        }

        .confirm-page {
            margin: 0;
            min-height: 100vh;
            padding-bottom: 0 !important;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--confirm-text);
            background: #fafbfc;
        }

        /* Header – matcher forsiden, virker også uden styles.css */
        .confirm-topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid rgba(151, 111, 255, 0.1);
            transition: box-shadow 0.25s ease;
        }

        .confirm-topbar.is-scrolled {
            box-shadow: 0 4px 24px rgba(151, 111, 255, 0.08);
        }

        .confirm-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            border-radius: 12px;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .confirm-logo-link:hover {
            opacity: 0.88;
            transform: scale(1.02);
        }

        .confirm-logo-link:focus-visible {
            outline: 2px solid var(--confirm-primary);
            outline-offset: 4px;
        }

        .confirm-logo-link img {
            height: 44px;
            width: auto;
            display: block;
        }

        /* Hero */
        .confirm-main {
            min-height: 100vh;
            padding: 6.5rem 1.25rem 3.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            background: linear-gradient(180deg, #f8f7ff 0%, #fafbfc 55%, #f5f3ff 100%);
        }

        .confirm-main::before,
        .confirm-main::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
        }

        .confirm-main::before {
            top: -15%;
            right: -20%;
            width: 70%;
            height: 75%;
            background: radial-gradient(circle, rgba(151, 111, 255, 0.14) 0%, transparent 68%);
            animation: confirmFloatA 20s ease-in-out infinite alternate;
        }

        .confirm-main::after {
            bottom: -25%;
            left: -25%;
            width: 65%;
            height: 65%;
            background: radial-gradient(circle, rgba(123, 75, 255, 0.09) 0%, transparent 70%);
            animation: confirmFloatB 24s ease-in-out infinite alternate;
        }

        @keyframes confirmFloatA {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5%, 4%) scale(1.06); }
        }

        @keyframes confirmFloatB {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(6%, -3%) scale(1.05); }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-main::before,
            .confirm-main::after {
                animation: none;
            }
        }

        /* Card */
        .confirm-card {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            padding: 2.75rem 2rem 2.5rem;
            text-align: center;
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--confirm-radius);
            border: 1px solid rgba(151, 111, 255, 0.14);
            box-shadow:
                0 4px 8px rgba(15, 15, 20, 0.04),
                0 24px 48px rgba(151, 111, 255, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.95);
        }

        .confirm-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(145deg, rgba(151, 111, 255, 0.45), rgba(123, 75, 255, 0.06) 50%, rgba(151, 111, 255, 0.25));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .confirm-badge {
            position: relative;
            width: 64px;
            height: 64px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background: linear-gradient(160deg, #fff 0%, rgba(151, 111, 255, 0.12) 100%);
            border: 1px solid rgba(151, 111, 255, 0.22);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 32px rgba(123, 75, 255, 0.2);
        }

        .confirm-badge svg {
            width: 30px;
            height: 30px;
            color: var(--confirm-primary);
        }

        .confirm-eyebrow {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--confirm-primary-dark);
            margin-bottom: 0.75rem;
            opacity: 0.9;
        }

        .confirm-headline {
            font-family: 'Manrope', sans-serif;
            font-size: clamp(1.75rem, 4.5vw, 2.35rem);
            font-weight: 800;
            line-height: 1.18;
            letter-spacing: -0.03em;
            margin: 0 0 1rem;
            color: var(--confirm-text);
        }

        .confirm-headline .confirm-headline-accent {
            background: var(--confirm-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .confirm-headline .confirm-headline-emoji {
            -webkit-text-fill-color: currentColor;
            color: var(--confirm-text);
            font-weight: 800;
            margin-left: 0.15em;
        }

        .confirm-lead {
            font-size: 1.0625rem;
            font-weight: 600;
            line-height: 1.65;
            color: var(--confirm-muted);
            margin: 0 0 1.75rem;
        }

        .confirm-actions {
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            align-items: stretch;
        }

        .confirm-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85rem 1.35rem;
            font-size: 0.95rem;
            font-weight: 600;
            font-family: inherit;
            border-radius: 14px;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        }

        .confirm-btn--primary {
            background: var(--confirm-gradient);
            color: #fff;
            border: none;
            box-shadow: 0 4px 20px rgba(151, 111, 255, 0.35);
        }

        .confirm-btn--primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(151, 111, 255, 0.4);
        }

        .confirm-btn--ghost {
            background: transparent;
            color: var(--confirm-muted);
            border: 1px solid rgba(151, 111, 255, 0.25);
        }

        .confirm-btn--ghost:hover {
            background: rgba(151, 111, 255, 0.08);
            color: var(--confirm-primary-dark);
        }

        .confirm-foot {
            margin-top: 2rem;
            padding-top: 1.25rem;
            border-top: 1px solid rgba(151, 111, 255, 0.1);
            font-size: 0.8125rem;
            color: var(--confirm-light);
        }

        /* Reveal (kun med JS) */
        .confirm-reveal {
            position: relative;
            z-index: 1;
        }

        html.confirm-enhanced .confirm-reveal {
            opacity: 0;
            transform: translateY(18px);
        }

        html.confirm-enhanced.confirm-done .confirm-reveal {
            opacity: 1;
            transform: translateY(0);
            transition:
                opacity 0.7s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @media (prefers-reduced-motion: reduce) {
            html.confirm-enhanced .confirm-reveal {
                opacity: 1;
                transform: none;
                transition: none;
            }
        }

        /* Splash */
        .confirm-splash {
            position: fixed;
            inset: 0;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(168deg, #f8f7ff 0%, #ebe4ff 50%, #f4f2ff 100%);
            opacity: 0;
            visibility: hidden;
            transition:
                opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                visibility 0s linear 0.55s;
        }

        .confirm-splash.is-on {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.35s cubic-bezier(0.22, 1, 0.36, 1), visibility 0s;
        }

        .confirm-splash.is-off {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        html:not(.confirm-enhanced) .confirm-splash,
        .confirm-splash--skip {
            display: none !important;
        }

        .confirm-splash__burst {
            position: absolute;
            width: min(130vw, 760px);
            height: min(130vw, 760px);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(151, 111, 255, 0.28) 0%, transparent 65%);
            transform: scale(0.55);
            opacity: 0;
            animation: confirmBurst 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .confirm-splash.is-off .confirm-splash__burst {
            animation: none;
            opacity: 0;
            transform: scale(1.35);
            transition: opacity 0.45s ease, transform 0.55s ease;
        }

        @keyframes confirmBurst {
            0% { transform: scale(0.5); opacity: 0; }
            40% { opacity: 1; }
            100% { transform: scale(1); opacity: 0.5; }
        }

        .confirm-splash__logo {
            position: relative;
            width: clamp(76px, 20vw, 108px);
            height: auto;
            filter: drop-shadow(0 16px 48px rgba(123, 75, 255, 0.3));
            transform: scale(0.86);
            opacity: 0;
            animation: confirmLogoIn 0.95s cubic-bezier(0.22, 1, 0.36, 1) 0.06s forwards;
        }

        .confirm-splash.is-off .confirm-splash__logo {
            animation: none;
            opacity: 0;
            transform: scale(1.06);
            transition: opacity 0.4s ease, transform 0.5s ease;
        }

        @keyframes confirmLogoIn {
            to { transform: scale(1); opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-splash__burst,
            .confirm-splash__logo {
                animation: none !important;
            }
            .confirm-splash__logo {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body class="landing-page confirm-page">
    <div class="confirm-splash" id="confirmSplash" aria-hidden="true">
        <div class="confirm-splash__burst" aria-hidden="true"></div>
        <img src="/assets/logo.png" alt="" class="confirm-splash__logo" width="108" height="108">
    </div>

    <header class="confirm-topbar" id="confirmTopbar">
        <a href="/index.html" class="confirm-logo-link" aria-label="Gå til forsiden">
            <img src="/assets/logo.png" alt="Gymly" width="120" height="44">
        </a>
    </header>

    <main class="confirm-main">
        <div class="confirm-card confirm-reveal">
            <p class="confirm-eyebrow">E-mail bekræftet</p>
            <div class="confirm-badge" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 6L9 17l-5-5"/>
                </svg>
            </div>
            <h1 class="confirm-headline">Din konto er nu <span class="confirm-headline-accent">bekræftet</span><span class="confirm-headline-emoji" aria-hidden="true">✅</span></h1>
            <p class="confirm-lead">Velkommen til Gymly. Du kan lukke dette vindue og fortsætte i appen &mdash; eller gå til forsiden nedenfor.</p>
            <div class="confirm-actions">
                <a href="/index.html" class="confirm-btn confirm-btn--primary">Gå til gymlyapp.com</a>
                <a href="/download.html" class="confirm-btn confirm-btn--ghost">Download appen</a>
            </div>
            <p class="confirm-foot">Har du brug for hjælp? Besøg <a href="/support.html" style="color: var(--confirm-primary); font-weight: 600; text-decoration: none;">Support</a>.</p>
        </div>
    </main>

    <script>
        (function () {
            var bar = document.getElementById('confirmTopbar');
            if (bar) {
                function onScroll() {
                    bar.classList.toggle('is-scrolled', window.scrollY > 10);
                }
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
            }

            var splash = document.getElementById('confirmSplash');
            var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function finish() {
                document.documentElement.classList.add('confirm-done');
            }

            if (!splash || reduced) {
                splash && splash.classList.add('confirm-splash--skip');
                finish();
                return;
            }

            splash.classList.add('is-on');
            window.setTimeout(function () {
                splash.classList.remove('is-on');
                splash.classList.add('is-off');
                finish();
            }, 1000);
        })();
    </script>
</body>
</html>
