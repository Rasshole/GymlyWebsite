<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Konto bekræftet | Gymly</title>
    <meta name="description" content="Din Gymly-konto er bekræftet.">
    <meta name="color-scheme" content="light">
    <link rel="canonical" href="https://gymlyapp.com/confirm">
    <script>document.documentElement.classList.add('confirm-js');</script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        /* SF Pro på Apple-enheder; system-ui ellers · Apple-lignende hierarchi */
        :root {
            --gymly-purple: #976fff;
            --gymly-purple-deep: #7b4bff;
            --gymly-purple-soft: #b894ff;
            --gymly-gradient: linear-gradient(135deg, #9b73ff 0%, #976fff 40%, #7b4bff 100%);
            --gymly-gradient-hover: linear-gradient(135deg, #a680ff 0%, #9b73ff 45%, #8255ff 100%);
            --text-strong: #0c0c10;
            --text-body: rgba(18, 18, 24, 0.62);
            --text-soft: rgba(18, 18, 24, 0.45);
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', system-ui, 'Segoe UI', sans-serif;
            --radius-card: clamp(26px, 5vw, 32px);
            --ease-premium: cubic-bezier(0.22, 1, 0.36, 1);
        }

        html {
            scroll-behavior: smooth;
            -webkit-text-size-adjust: 100%;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            min-height: 100dvh;
        }

        body {
            font-family: var(--font);
            color: var(--text-strong);
            background: #f6f4fd;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
        }

        /* --- Ambient canvas --- */
        .confirm-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            background: linear-gradient(180deg, #fffeff 0%, #f3f1fd 42%, #ece8fb 78%, #e8e4fa 100%);
        }

        .confirm-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(75px);
            opacity: 0.65;
            will-change: transform;
            animation: blobDrift 22s var(--ease-premium) infinite alternate;
        }

        .confirm-blob--a {
            width: min(90vw, 520px);
            height: min(90vw, 520px);
            top: -12%;
            right: -18%;
            background: radial-gradient(circle, rgba(151, 111, 255, 0.55) 0%, transparent 72%);
            animation-duration: 24s;
        }

        .confirm-blob--b {
            width: min(85vw, 480px);
            height: min(85vw, 480px);
            bottom: -20%;
            left: -22%;
            background: radial-gradient(circle, rgba(147, 90, 255, 0.38) 0%, transparent 72%);
            animation-duration: 28s;
            animation-delay: -4s;
        }

        .confirm-blob--c {
            width: min(65vw, 320px);
            height: min(65vw, 320px);
            top: 38%;
            left: 52%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(176, 142, 255, 0.22) 0%, transparent 70%);
            animation-duration: 19s;
            animation-delay: -2s;
        }

        @keyframes blobDrift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.55; }
            100% { transform: translate(-4vw, 3vh) scale(1.08); opacity: 0.72; }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-blob { animation: none; opacity: 0.45; }
        }

        .confirm-float-shapes .shape {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0));
            box-shadow:
                0 0 0 1px rgba(151, 111, 255, 0.06),
                0 24px 64px rgba(123, 75, 255, 0.07);
            animation: shapeFloat 12s ease-in-out infinite;
        }

        .shape--1 {
            width: 180px;
            height: 180px;
            top: 14%;
            left: 8%;
            animation-delay: 0s;
        }

        .shape--2 {
            width: 100px;
            height: 100px;
            bottom: 28%;
            right: 10%;
            animation-delay: -3s;
            animation-duration: 14s;
        }

        .shape--3 {
            width: 64px;
            height: 64px;
            top: 62%;
            left: 6%;
            animation-delay: -6s;
            animation-duration: 11s;
        }

        @keyframes shapeFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.65; }
            50% { transform: translateY(-12px) rotate(4deg); opacity: 0.9; }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-float-shapes .shape { animation: none; }
        }

        /* Film grain noise */
        .confirm-noise {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.038;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        .confirm-vignette {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            box-shadow:
                inset 0 0 100px rgba(246, 244, 253, 0.35),
                inset 0 -40px 100px rgba(232, 228, 250, 0.45),
                inset 0 0 180px rgba(147, 90, 255, 0.06);
        }

        /* Particles */
        .confirm-particles {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }

        .confirm-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(151, 111, 255, 0.55), transparent);
            opacity: 0;
            animation: particleTwinkle 4.8s ease-in-out infinite;
        }

        .confirm-particle:nth-child(1) { top: 22%; left: 18%; animation-delay: 0s; }
        .confirm-particle:nth-child(2) { top: 58%; left: 12%; animation-delay: 0.9s; }
        .confirm-particle:nth-child(3) { top: 30%; right: 20%; animation-delay: 1.6s; }
        .confirm-particle:nth-child(4) { top: 72%; right: 28%; animation-delay: 0.4s; }
        .confirm-particle:nth-child(5) { top: 44%; left: 42%; animation-delay: 2.2s; width: 3px; height: 3px; }
        .confirm-particle:nth-child(6) { bottom: 24%; left: 32%; animation-delay: 1.2s; }
        .confirm-particle:nth-child(7) { top: 12%; left: 55%; animation-delay: 3s; width: 2px; height: 2px; }
        .confirm-particle:nth-child(8) { bottom: 40%; right: 14%; animation-delay: 2.8s; }

        @keyframes particleTwinkle {
            0%, 100% { opacity: 0; transform: scale(0.7); }
            40% { opacity: 1; transform: scale(1); }
            70% { opacity: 0.35; transform: scale(0.95); }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-particle { animation: none; opacity: 0; visibility: hidden; }
        }

        /* Top bar */
        .confirm-topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: calc(14px + env(safe-area-inset-top)) 22px 14px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            background: rgba(255, 255, 255, 0.64);
            backdrop-filter: saturate(165%) blur(22px);
            -webkit-backdrop-filter: saturate(165%) blur(22px);
            border-bottom: 1px solid rgba(151, 111, 255, 0.09);
            transition: box-shadow 0.35s var(--ease-premium), background 0.35s ease;
        }

        .confirm-topbar.is-scrolled {
            box-shadow: 0 18px 50px rgba(118, 80, 200, 0.08);
            background: rgba(255, 255, 255, 0.78);
        }

        .confirm-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            border-radius: 14px;
            transition: opacity 0.25s ease, transform 0.35s var(--ease-premium);
        }

        .confirm-logo-link:hover {
            opacity: 0.92;
            transform: scale(1.025);
        }

        .confirm-logo-link:focus-visible {
            outline: 2px solid var(--gymly-purple);
            outline-offset: 4px;
        }

        .confirm-logo-link img {
            height: 44px;
            width: auto;
            display: block;
        }

        /* Main shell */
        .confirm-shell {
            position: relative;
            z-index: 10;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: calc(104px + env(safe-area-inset-top)) 20px calc(44px + env(safe-area-inset-bottom));
        }

        /* Card */
        .confirm-card {
            position: relative;
            width: min(100%, 500px);
            padding: clamp(2.75rem, 6vw, 3.55rem) clamp(1.75rem, 5vw, 2.75rem) clamp(2.25rem, 5vw, 2.85rem);
            text-align: center;
            border-radius: var(--radius-card);
            background: rgba(255, 255, 255, 0.55);
            backdrop-filter: saturate(160%) blur(36px);
            -webkit-backdrop-filter: saturate(160%) blur(36px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            box-shadow:
                0 0 0 1px rgba(151, 111, 255, 0.07) inset,
                0 1px 0 rgba(255, 255, 255, 0.95) inset,
                0 32px 64px rgba(118, 80, 200, 0.11),
                0 8px 16px rgba(25, 20, 48, 0.04),
                0 0 0 1px rgba(151, 111, 255, 0.11);
            transform: translateY(12px);
            opacity: 0;
            animation: cardIn 1s var(--ease-premium) 0.06s forwards;
        }

        @keyframes cardIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-card {
                opacity: 1;
                transform: none;
                animation: none;
            }
        }

        /* Purple ambient glow behind card */
        .confirm-card-glow {
            position: absolute;
            inset: -24%;
            z-index: -1;
            background: radial-gradient(ellipse at 50% 30%, rgba(151, 111, 255, 0.32) 0%, rgba(147, 90, 255, 0.08) 38%, transparent 68%);
            filter: blur(28px);
            pointer-events: none;
            opacity: 0;
            animation: glowFade 1.35s var(--ease-premium) 0.2s forwards;
        }

        @keyframes glowFade {
            to { opacity: 1; }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-card-glow { opacity: 0.85; animation: none; }
        }

        .confirm-divider-soft {
            width: 48px;
            height: 3px;
            margin: 0 auto 1.35rem;
            border-radius: 100px;
            background: linear-gradient(90deg, transparent, rgba(151, 111, 255, 0.35), transparent);
            opacity: 0;
            animation: softFade 0.8s var(--ease-premium) 0.35s forwards;
        }

        @keyframes softFade {
            to { opacity: 1; }
        }

        .confirm-eyebrow {
            font-size: 0.6875rem;
            font-weight: 700;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            color: rgba(123, 75, 255, 0.88);
            margin: 0 0 clamp(1.25rem, 3vw, 1.65rem);
            opacity: 0;
            animation: softFadeUp 0.75s var(--ease-premium) 0.2s forwards;
        }

        @keyframes softFadeUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Success icon hub */
        .confirm-success-wrap {
            position: relative;
            width: 92px;
            height: 92px;
            margin: 0 auto clamp(1.5rem, 4vw, 2rem);
        }

        .confirm-ring-glow {
            position: absolute;
            inset: -18px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(151, 111, 255, 0.35) 0%, transparent 70%);
            animation: pulseGlow 2.8s ease-in-out infinite;
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.45; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.06); }
        }

        .confirm-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            padding: 2px;
            background: linear-gradient(145deg, rgba(151, 111, 255, 0.55), rgba(184, 148, 255, 0.18), rgba(123, 75, 255, 0.5));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            animation: ringIn 1s var(--ease-premium) 0.15s forwards;
        }

        @keyframes ringIn {
            from {
                opacity: 0;
                transform: rotate(-35deg) scale(0.75);
            }
            to {
                opacity: 1;
                transform: rotate(0) scale(1);
            }
        }

        .confirm-icon-disc {
            position: absolute;
            inset: 4px;
            border-radius: 50%;
            display: grid;
            place-items: center;
            background: linear-gradient(165deg, #ffffff 0%, rgba(250, 248, 255, 1) 100%);
            box-shadow:
                0 4px 20px rgba(123, 75, 255, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.96);
            animation: iconFloat 4.2s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-ring-glow, .confirm-ring, .confirm-icon-disc {
                animation: none !important;
            }
            .confirm-ring-glow { opacity: 0.55; transform: scale(1); }
            .confirm-ring { opacity: 1; transform: none; }
            .confirm-icon-disc { transform: none; }
        }

        .confirm-check {
            width: 34px;
            height: 34px;
        }

        .confirm-check path {
            stroke: url(#confirmCheckGrad);
            stroke-width: 2.75;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            stroke-dasharray: 32;
            stroke-dashoffset: 32;
            animation: drawCheck 0.75s var(--ease-premium) 0.5s forwards;
        }

        @keyframes drawCheck {
            to { stroke-dashoffset: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-check path { animation: none; stroke-dashoffset: 0; }
        }

        .confirm-headline {
            font-family: var(--font);
            font-size: clamp(1.85rem, 5.8vw, 2.375rem);
            font-weight: 700;
            line-height: 1.08;
            letter-spacing: -0.035em;
            margin: 0 0 1rem;
            color: var(--text-strong);
            opacity: 0;
            animation: softFadeUp 0.82s var(--ease-premium) 0.32s forwards;
        }

        .confirm-headline span.accent {
            background: linear-gradient(105deg, #9b73ff 0%, #7b4bff 55%, var(--gymly-purple-soft) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }

        .confirm-lead {
            font-family: var(--font);
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.72;
            color: var(--text-body);
            letter-spacing: -0.015em;
            margin: 0 0 clamp(1.85rem, 4vw, 2.35rem);
            max-width: 38ch;
            margin-left: auto;
            margin-right: auto;
            opacity: 0;
            animation: softFadeUp 0.82s var(--ease-premium) 0.42s forwards;
        }

        .confirm-actions {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            opacity: 0;
            animation: softFadeUp 0.82s var(--ease-premium) 0.52s forwards;
        }

        .confirm-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 52px;
            padding: 0 1.5rem;
            font-family: var(--font);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.02em;
            border-radius: 16px;
            text-decoration: none;
            transition:
                transform 0.42s var(--ease-premium),
                box-shadow 0.42s var(--ease-premium),
                background 0.35s ease,
                border-color 0.35s ease,
                color 0.3s ease;
        }

        .confirm-btn:active {
            transform: scale(0.978);
            transition-duration: 0.1s;
        }

        .confirm-btn:focus-visible {
            outline: none;
            box-shadow:
                0 0 0 3px rgba(255, 255, 255, 1),
                0 0 0 6px rgba(151, 111, 255, 0.5);
        }

        .confirm-btn--primary {
            color: #fff;
            background: var(--gymly-gradient);
            border: none;
            box-shadow:
                0 2px 0 rgba(255, 255, 255, 0.18) inset,
                0 12px 32px rgba(118, 80, 200, 0.32),
                0 4px 12px rgba(123, 75, 255, 0.18);
        }

        .confirm-btn--primary:hover {
            transform: translateY(-2px);
            background: var(--gymly-gradient-hover);
            box-shadow:
                0 2px 0 rgba(255, 255, 255, 0.22) inset,
                0 18px 44px rgba(118, 80, 200, 0.38),
                0 8px 20px rgba(123, 75, 255, 0.22);
        }

        .confirm-btn--ghost {
            color: rgba(92, 92, 109, 0.95);
            background: rgba(255, 255, 255, 0.45);
            border: 1.5px solid rgba(151, 111, 255, 0.22);
            box-shadow: 0 1px 0 rgba(255, 255, 255, 0.72) inset;
        }

        .confirm-btn--ghost:hover {
            color: var(--gymly-purple-deep);
            border-color: rgba(151, 111, 255, 0.42);
            background: rgba(255, 255, 255, 0.75);
            box-shadow:
                0 1px 0 rgba(255, 255, 255, 0.9) inset,
                0 0 0 4px rgba(151, 111, 255, 0.08),
                0 12px 28px rgba(118, 80, 200, 0.1);
            transform: translateY(-2px);
        }

        .confirm-foot-wrap {
            margin-top: clamp(1.85rem, 4vw, 2.35rem);
            padding-top: 1.55rem;
            border-top: 1px solid rgba(151, 111, 255, 0.1);
            opacity: 0;
            animation: softFadeUp 0.82s var(--ease-premium) 0.62s forwards;
        }

        .confirm-foot {
            font-family: var(--font);
            font-size: 0.8125rem;
            font-weight: 500;
            line-height: 1.65;
            color: var(--text-soft);
            margin: 0;
            letter-spacing: -0.01em;
        }

        .confirm-foot a {
            color: var(--gymly-purple-deep);
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s ease, color 0.2s ease;
            background: linear-gradient(90deg, var(--gymly-purple-deep), var(--gymly-purple-soft));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .confirm-foot a:hover {
            opacity: 0.82;
        }

        /* Splash */
        .confirm-splash {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: grid;
            place-items: center;
            background: linear-gradient(172deg, #fefdff 0%, #efebfd 52%, #e6e2fa 100%);
            opacity: 0;
            visibility: hidden;
            transition:
                opacity 0.62s var(--ease-premium),
                visibility 0s linear 0.62s;
        }

        .confirm-splash.is-on {
            opacity: 1;
            visibility: visible;
            transition: opacity 0.38s var(--ease-premium), visibility 0s;
        }

        .confirm-splash.is-off {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        html:not(.confirm-js) .confirm-splash,
        .confirm-splash--skip {
            display: none !important;
        }

        .confirm-splash__pulse {
            position: absolute;
            width: min(110vw, 640px);
            height: min(110vw, 640px);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(151, 111, 255, 0.22) 0%, transparent 64%);
            transform: scale(0.82);
            animation: splashPulse 1.05s var(--ease-premium) forwards;
        }

        @keyframes splashPulse {
            from { opacity: 0; transform: scale(0.55); }
            to { opacity: 1; transform: scale(1); }
        }

        .confirm-splash__logo {
            position: relative;
            width: clamp(80px, 22vw, 112px);
            height: auto;
            filter: drop-shadow(0 24px 48px rgba(123, 75, 255, 0.28));
            transform: translateY(8px);
            opacity: 0;
            animation: splashLogoIn 1s var(--ease-premium) 0.08s forwards;
        }

        @keyframes splashLogoIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .confirm-splash.is-off .confirm-splash__logo {
            opacity: 0 !important;
            transform: translateY(-10px);
            transition: opacity 0.45s ease, transform 0.55s var(--ease-premium);
            animation: none;
        }

        @media (prefers-reduced-motion: reduce) {
            .confirm-splash__pulse { animation: none; opacity: 0.85; transform: scale(1); }
            .confirm-splash__logo { animation: none; opacity: 1; transform: none; }
        }
    </style>
</head>
<body>
    <div class="confirm-canvas" aria-hidden="true">
        <div class="confirm-blob confirm-blob--a"></div>
        <div class="confirm-blob confirm-blob--b"></div>
        <div class="confirm-blob confirm-blob--c"></div>
        <div class="confirm-float-shapes">
            <div class="shape shape--1" aria-hidden="true"></div>
            <div class="shape shape--2" aria-hidden="true"></div>
            <div class="shape shape--3" aria-hidden="true"></div>
        </div>
        <div class="confirm-noise"></div>
        <div class="confirm-vignette"></div>
        <div class="confirm-particles" aria-hidden="true">
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
            <span class="confirm-particle"></span>
        </div>
    </div>

    <div class="confirm-splash" id="confirmSplash" aria-hidden="true">
        <div class="confirm-splash__pulse" aria-hidden="true"></div>
        <img src="/assets/logo.png" alt="" class="confirm-splash__logo" width="112" height="112" decoding="async">
    </div>

    <header class="confirm-topbar" id="confirmTopbar">
        <a href="/index.html" class="confirm-logo-link" aria-label="Gå til forsiden">
            <img src="/assets/logo.png" alt="Gymly" width="128" height="44" decoding="async">
        </a>
    </header>

    <main class="confirm-shell">
        <div class="confirm-card" role="article" aria-labelledby="confirmTitle">
            <div class="confirm-card-glow" aria-hidden="true"></div>

            <!-- SVG defs for check gradient -->
            <svg width="0" height="0" style="position:absolute" aria-hidden="true">
                <defs>
                    <linearGradient id="confirmCheckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#976fff"/>
                        <stop offset="100%" stop-color="#7b4bff"/>
                    </linearGradient>
                </defs>
            </svg>

            <p class="confirm-eyebrow">E-mail bekræftet</p>
            <div class="confirm-divider-soft" aria-hidden="true"></div>

            <div class="confirm-success-wrap" aria-hidden="true">
                <div class="confirm-ring-glow"></div>
                <div class="confirm-ring"></div>
                <div class="confirm-icon-disc">
                    <svg class="confirm-check" viewBox="0 0 24 24" aria-hidden="true">
                        <path d="M20 6L9 17l-5-5"/>
                    </svg>
                </div>
            </div>

            <h1 id="confirmTitle" class="confirm-headline">Din konto er nu <span class="accent">bekræftet</span></h1>
            <p class="confirm-lead">Velkommen til Gymly — du kan lukke dette vindue og åbne appen igen, eller vende tilbage til forsiden herunder.</p>

            <div class="confirm-actions">
                <a href="/index.html" class="confirm-btn confirm-btn--primary">Til forsiden</a>
                <a href="/download.html" class="confirm-btn confirm-btn--ghost">Download appen</a>
            </div>

            <div class="confirm-foot-wrap">
                <p class="confirm-foot">
                    Har du brug for hjælp? <a href="/support.html">Support</a>
                </p>
            </div>
        </div>
    </main>

    <script>
        (function () {
            var bar = document.getElementById('confirmTopbar');
            if (bar) {
                var onScroll = function () {
                    bar.classList.toggle('is-scrolled', window.scrollY > 14);
                };
                window.addEventListener('scroll', onScroll, { passive: true });
                onScroll();
            }

            var splash = document.getElementById('confirmSplash');
            var mq = window.matchMedia('(prefers-reduced-motion: reduce)');
            if (!splash || mq.matches) {
                if (splash) splash.classList.add('confirm-splash--skip');
                return;
            }
            splash.classList.add('is-on');
            window.setTimeout(function () {
                splash.classList.remove('is-on');
                splash.classList.add('is-off');
            }, 840);
        })();
    </script>
</body>
</html>
