<!DOCTYPE html>
<html lang="da" class="landing-page landing-premium">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samarbejde | Gymly</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css?v=19">
    <script src="/lang.js" defer></script>
    <style>
        .samarbejde-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-white);
        }
        .samarbejde-main {
            flex: 1;
            max-width: 560px;
            margin: 0 auto;
            padding: 2rem 2rem 4rem;
            width: 100%;
        }
        .samarbejde-main h1 {
            font-family: 'Manrope', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        .samarbejde-main .intro {
            color: var(--text-light);
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }
        .samarbejde-form label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dark);
            margin-bottom: 0.35rem;
        }
        .samarbejde-form input,
        .samarbejde-form textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: inherit;
            margin-bottom: 1.25rem;
            box-sizing: border-box;
        }
        .samarbejde-form textarea {
            min-height: 120px;
            resize: vertical;
        }
        .samarbejde-form input:focus,
        .samarbejde-form textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-pastel);
        }
        .samarbejde-form .optional {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 0.85rem;
        }
        .samarbejde-form button[type="submit"] {
            width: 100%;
            padding: 0.9rem 1rem;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s;
        }
        .samarbejde-form button[type="submit"]:hover {
            background-color: var(--primary-dark);
        }
        .samarbejde-footer {
            padding: 1rem 2rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem 1.25rem;
            justify-content: center;
            background: var(--bg-white);
        }
        .samarbejde-footer a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.8rem;
        }
        .samarbejde-footer a:hover {
            text-decoration: underline;
            color: var(--primary);
        }
        .samarbejde-footer .sep {
            color: var(--text-secondary);
            pointer-events: none;
        }
    </style>
</head>
<body class="landing-page landing-premium samarbejde-page">
    <header class="landing-header lp-header" id="landingHeader">
        <div class="lp-header-inner">
            <a href="/" class="landing-logo-link">
                <img src="/assets/logo.png" alt="Gymly" class="landing-logo">
            </a>
            <nav class="landing-nav lp-nav" aria-label="Hovedmenu">
                <a href="/#features">Features</a>
                <a href="/badges/">Badges</a>
                <a href="/download.html">Download</a>
                <a href="/support.html">Support</a>
            </nav>
            <div class="landing-cta lp-header-cta">
                <a href="https://apps.apple.com/dk/app/gymly-st%C3%A6rkere-sammen/id6757790972?l=da" class="btn-primary lp-btn-compact" target="_blank" rel="noopener noreferrer">
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
                    Download
                </a>
            </div>
        </div>
    </header>

    <main class="samarbejde-main">
        <h1 data-i18n="samarbejde.title">Samarbejde</h1>
        <p class="intro" data-i18n="samarbejde.intro">Vil du samarbejde med Gymly? Udfyld formularen herunder, så vender vi tilbage til dig.</p>

        <form id="samarbejdeForm" class="samarbejde-form">
            <label for="navn">Navn <span class="optional">(påkrævet)</span></label>
            <input type="text" id="navn" name="navn" required placeholder="Dit fulde navn">

            <label for="email">E-mail <span class="optional">(påkrævet)</span></label>
            <input type="email" id="email" name="email" required placeholder="din@email.dk">

            <label for="virksomhed">Virksomhed / organisation <span class="optional">(valgfri)</span></label>
            <input type="text" id="virksomhed" name="virksomhed" placeholder="F.eks. fitnesscenter, forening">

            <label for="telefon">Telefon <span class="optional">(valgfri)</span></label>
            <input type="tel" id="telefon" name="telefon" placeholder="12 34 56 78">

            <label for="beskrivelse">Hvem er du, og hvad ønsker du at samarbejde om? <span class="optional">(påkrævet)</span></label>
            <textarea id="beskrivelse" name="beskrivelse" required placeholder="Fortæl kort om dig selv og din idé til samarbejde..."></textarea>

            <button type="submit">Send</button>
        </form>
    </main>

    <footer class="samarbejde-footer">
        <a href="/privacy.html" data-i18n="footer.privacy">Privatlivspolitik</a>
        <a href="/terms.html" data-i18n="footer.terms">Vilkår og betingelser</a>
        <a href="/samarbejde.html" data-i18n="footer.collab">Samarbejde</a>
        <a href="/support.html" data-i18n="footer.support">Support</a>
        <span class="sep">·</span>
        <a href="#" data-lang="da">Dansk</a>
        <a href="#" data-lang="en">English (US)</a>
        <a href="#" data-lang="pl">Polski</a>
        <a href="#" data-lang="de">Deutsch</a>
        <a href="#" data-lang-more>Flere sprog...</a>
    </footer>

    <script>
        document.getElementById('samarbejdeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var navn = document.getElementById('navn').value.trim();
            var email = document.getElementById('email').value.trim();
            var virksomhed = document.getElementById('virksomhed').value.trim();
            var telefon = document.getElementById('telefon').value.trim();
            var beskrivelse = document.getElementById('beskrivelse').value.trim();

            var body = 'Samarbejde – tilmelding fra gymly.dk\n\n';
            body += 'Navn: ' + navn + '\n';
            body += 'E-mail: ' + email + '\n';
            if (virksomhed) body += 'Virksomhed/organisation: ' + virksomhed + '\n';
            if (telefon) body += 'Telefon: ' + telefon + '\n';
            body += '\nBesked:\n' + beskrivelse;

            var subject = 'Samarbejde – ' + (virksomhed || navn);
            var mailto = 'mailto:appgymly@gmail.com?subject=' + encodeURIComponent(subject) + '&body=' + encodeURIComponent(body);
            window.location.href = mailto;
        });
    </script>
    <script>
        (function() {
            var h = document.getElementById('landingHeader');
            if (!h) return;
            function s() { h.classList.toggle('scrolled', window.scrollY > 16); }
            window.addEventListener('scroll', s);
            s();
        })();
    </script>
</body>
</html>
